<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Niloofar</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Intro Screen -->
    <section id="intro">

        <div id="compass">
            🧭
        </div>

        <div id="plane-container">
            <div id="plane">✈</div>
        </div>

        <div id="birthday-content">

            <h1 class="title">Happy Birthday</h1>

            <h2>18 July 1994</h2>

            <p class="subtitle">
                A one-day journey into your world...
            </p>

            <button id="openLetter">
                Click Me
            </button>

        </div>

    </section>


    <!-- Letter Section -->

    <section id="letterSection">

        <div class="envelope">

            <!-- Left Side -->

            <div class="left-panel">

                <img
                    src="assets/cake.gif"
                    alt="Birthday Cake"
                    class="cake"
                >

            </div>

            <!-- Right Side -->

            <div class="right-panel">

                <div class="top-box">

                    <div class="record-player">

                        <img
                            src="assets/gramophone.gif"
                            alt="Gramophone"
                            class="gramophone"
                        >


                    </div>

                </div>

                <div class="bottom-box">

                    <h2 class="letter-title">Dear Niloofar 💖</h2>

                    <p class="typewriter" id="typeText"></p>

                </div>

            </div>

        </div>
    </section>


    <!-- Petals -->

    <div id="petalContainer"></div>


    <!-- Audio -->

    <audio id="birthdayMusic" loop>
        <source src="assets/happy-birthday.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
</html>
